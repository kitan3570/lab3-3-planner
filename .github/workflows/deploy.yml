name: CloudBase CI/CD

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Check Secrets
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          ENV_ID: ${{ secrets.ENV_ID }}
        run: |
          if [ -z "$SECRET_ID" ]; then echo "❌ 错误: 找不到 TENCENT_SECRET_ID"; exit 1; fi
          if [ -z "$SECRET_KEY" ]; then echo "❌ 错误: 找不到 TENCENT_SECRET_KEY"; exit 1; fi
          if [ -z "$ENV_ID" ]; then echo "❌ 错误: 找不到 ENV_ID"; exit 1; fi
          echo "✅ 所有环境变量检查通过！"

      - name: Login to CloudBase
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: tcb login --apiKeyId $SECRET_ID --apiKeySecret $SECRET_KEY

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Frontend
        env:
          ENV_ID: ${{ secrets.ENV_ID }}
        run: tcb hosting deploy frontend/dist -e $ENV_ID

      - name: Deploy Cloud Functions
        env:
          ENV_ID: ${{ secrets.ENV_ID }}
        run: tcb fn deploy --all -e $ENV_ID -y